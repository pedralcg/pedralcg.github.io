<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./recursos/favicon.png" type="image/x-icon">
    <title>Series temporales de Índices espectrales ESFP</title>
    <style>
        /* Reinicia márgenes y relleno */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Configuración básica */
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* Encabezado */
        header {
            background-color: #2a7b2e;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
        }

        /* Contenedor del iframe */
        .content {
            flex: 1;
            display: flex;
        }

        iframe {
            flex: 1;
            border: none;
            min-height: 300px; /* Altura mínima para móviles */
        }

        /* Footer */
        footer {
            background-color: #2a7b2e;
            color: white;
            text-align: center;
            padding: 0.5rem;
            font-size: 0.9rem;
        }

        footer a {
            color: #ffeb3b;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Consultas de medios (responsividad) */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.2rem;
            }

            footer {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1rem;
            }

            footer {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <!-- Encabezado -->
    <header>
        <h1>Descarga Índices Espectrales - Sentinel 2</h1>
        <h2>Terreno Forestal arbolado</h2>
    </header>

    <!-- Contenido principal (iframe ocupa todo el espacio disponible) -->
    <div class="content">
        <iframe src="https://code.earthengine.google.com/aab17484717046187e572f0c0fcf9a40?noload=true"></iframe>
    </div>

    <!-- Pie de página -->
    <footer>
        &copy; 2025 Pedro LCG | <a href="mailto:pedralcg@gmail.com">Contacto</a>
    </footer>
</body>
</html>
